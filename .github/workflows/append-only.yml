name: Append-only rulings log

on:
  pull_request:
    branches: [main]

jobs:
  check-rulings:
    name: RULINGS.md is append-only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch base ref
        run: git fetch origin ${{ github.base_ref }}
      - name: Check RULINGS.md against base
        run: node scripts/check-rulings-append-only.mjs
        env:
          RULINGS_BASE_REF: origin/${{ github.base_ref }}
