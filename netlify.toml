# Netlify configuration for The Latent Review.
# The site itself is a static Astro build; the only dynamic surface is the
# functions in netlify/functions (subscribe / confirm / unsubscribe).
# Secrets (Supabase service key, Resend key) live in Netlify environment
# variables — never in this repo (CLAUDE.md).

[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  # The AI review desk reads the editors' written criteria at runtime so the
  # criteria stay versioned in the repo (see docs/EDITORS-DESK.md).
  included_files = ["docs/EDITORIAL-CRITERIA.md"]

# Security response headers. Netlify ships none by default; these are
# defence-in-depth, and the CSP is a second line under the F2 XSS-class fix.
# The CSP is intentionally Report-Only first (per Netlify's guidance): it
# reports violations without blocking, so we can tighten from real data before
# enforcing. connect-src allows Supabase for the Editors' Desk client
# (admin.astro); style-src allows inline styles Astro emits.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    Content-Security-Policy-Report-Only = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://*.supabase.co"
